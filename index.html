<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHO TRUY CẬP BẢO MẬT</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary-color: #22c55e;    /* Xanh lá neon */
            --primary-hover: #16a34a;    /* Xanh lá đậm */
            --bg-dark: #09090b;          /* Nền đen */
            --card-bg: #18181b;          /* Nền khối */
            --border-color: #27272a;     /* Viền tối */
            --text-main: #ffffff;        /* Chữ trắng */
            --text-muted: #a1a1aa;       /* Chữ xám nhạt */
            --error-color: #ef4444;      /* Màu đỏ báo lỗi */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* Khối khung chung */
        .box-wrapper {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.1);
        }

        .title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 1.8rem;
        }

        /* Form Nhập Key */
        .input-group {
            margin-bottom: 1rem;
        }

        .key-input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            background-color: #09090b;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        .key-input:focus {
            border-color: var(--primary-color);
        }

        .btn-submit {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--primary-color);
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-top: 0.8rem;
            text-align: center;
            display: none;
            font-weight: 600;
        }

        /* Danh Sách Link (Mặc định ẩn) */
        .links-portal {
            display: none;
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #09090b;
            border: 1px solid var(--border-color);
            padding: 1rem 1.2rem;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .link-item:hover {
            border-color: var(--primary-color);
            background-color: var(--primary-color);
            color: #000000;
            transform: translateY(-2px);
        }

        .btn-logout {
            width: 100%;
            background-color: transparent;
            color: var(--error-color);
            border: 1px solid var(--error-color);
            padding: 0.7rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background-color: var(--error-color);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- KHỐI 1: FORM NHẬP KEY -->
    <div class="box-wrapper" id="keyBox">
        <h2 class="title">🔑 XÁC THỰC KEY</h2>
        <p class="desc">Vui lòng nhập Key để mở danh sách đường link bảo mật.</p>
        
        <div class="input-group">
            <input type="password" id="keyInput" class="key-input" placeholder="Nhập Key tại đây..." autocomplete="off">
        </div>
        
        <button class="btn-submit" onclick="verifyKey()">MỞ KHÓA NGAY</button>
        <div class="error-message" id="errorMsg">⚠️ Key không chính xác! Vui lòng thử lại.</div>
    </div>

    <!-- KHỐI 2: DANH SÁCH ĐƯỜNG LINK (CHỈ HIỆN KHI NHẬP ĐÚNG KEY) -->
    <div class="box-wrapper links-portal" id="linksBox">
        <h2 class="title">🌐 DANH SÁCH LIÊN KẾT</h2>
        <p class="desc">Bấm vào bất kỳ liên kết nào bên dưới để truy cập.</p>

        <div class="link-list">
            <!-- LINK 1 -->
            <a href="https://www.google.com" target="_blank" class="link-item">
                <span>🔍 Trang Tìm Kiếm Google</span>
                <span>➔</span>
            </a>

            <!-- LINK 2 -->
            <a href="https://www.youtube.com" target="_blank" class="link-item">
                <span>▶️ Kênh YouTube</span>
                <span>➔</span>
            </a>

            <!-- LINK 3 -->
            <a href="https://facebook.com" target="_blank" class="link-item">
                <span>📘 Trang Facebook Cá Nhân</span>
                <span>➔</span>
            </a>

            <!-- LINK 4 -->
            <a href="https://zalo.me" target="_blank" class="link-item">
                <span>💬 Nhóm Zalo Hỗ Trợ</span>
                <span>➔</span>
            </a>
        </div>

        <button class="btn-logout" onclick="lockPortal()">🔒 ĐÓNG KHÓA VÀ THOÁT</button>
    </div>

    <!-- XỬ LÝ JAVASCRIPT -->
    <script>
        // CẤU HÌNH KEY CỦA BẠN TẠI ĐÂY
        const SECRET_KEY = "KINGCUONG2026"; 

        // Kiểm tra xem trước đó đã đăng nhập chưa
        window.onload = function() {
            if (localStorage.getItem("isUnlocked") === "true") {
                showPortal();
            }
        };

        function verifyKey() {
            const inputVal = document.getElementById("keyInput").value.trim();
            const errorMsg = document.getElementById("errorMsg");

            if (inputVal === SECRET_KEY) {
                localStorage.setItem("isUnlocked", "true");
                showPortal();
            } else {
                errorMsg.style.display = "block";
                document.getElementById("keyInput").value = "";
                document.getElementById("keyInput").focus();
            }
        }

        function showPortal() {
            document.getElementById("keyBox").style.display = "none";
            document.getElementById("linksBox").style.display = "block";
        }

        function lockPortal() {
            localStorage.removeItem("isUnlocked");
            document.getElementById("keyBox").style.display = "block";
            document.getElementById("linksBox").style.display = "none";
            document.getElementById("keyInput").value = "";
            document.getElementById("errorMsg").style.display = "none";
        }

        // Nhấn Enter để gửi key
        document.getElementById("keyInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") verifyKey();
        });
    </script>

</body>
</html>
